{% extends "layouts/base.html" %}
{% block title %}Nuevo Barrio{% endblock %}
{% block page_title %}Nuevo Barrio{% endblock %}

{% block content %}
<div class="card-custom p-4" style="max-width:500px">
  <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="mb-3">
      <label class="form-label fw-semibold" style="font-size:13px">Nombre del Barrio *</label>
      <input type="text" name="nombre" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold" style="font-size:13px">Dirección</label>
      <input type="text" name="direccion" class="form-control">
    </div>
    <div class="d-flex gap-2 mt-4">
      <button type="submit" class="btn btn-gltec"><i class="bi bi-check-lg"></i> Crear Barrio</button>
      <a href="{{ url_for('admin.barrios') }}" class="btn btn-outline-secondary">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
